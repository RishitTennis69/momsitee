<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Smile Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #0E7B73;
      --primary-dark:  #0A5F59;
      --primary-light: #CCFBF1;
      --primary-bg:    #F0FDFA;
      --accent:        #F59E0B;
      --accent-bg:     #FFFBEB;
      --bg:            #F9F8F5;
      --surface:       #FFFFFF;
      --border:        #E7E4DF;
      --border-soft:   #F0EDE8;
      --text-1:        #1C1917;
      --text-2:        #57534E;
      --text-3:        #A8A29E;
      --r:    14px;
      --r-sm:  8px;
      --r-lg: 22px;
      --shadow:       0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(14,123,115,.08);
      --shadow-hover:  0 10px 32px rgba(14,123,115,.18), 0 4px 8px rgba(0,0,0,.06);
      --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-serif: 'Lora', Georgia, serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans); background: var(--bg);
      color: var(--text-1); line-height: 1.6; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ──────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow .2s;
    }
    nav.scrolled { box-shadow: 0 4px 20px rgba(0,0,0,.07); }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; height: 64px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none; user-select: none;
    }
    .logo-mark {
      width: 36px; height: 36px; background: var(--primary); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-mark svg { width: 20px; height: 20px; fill: #fff; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -.3px; color: var(--text-1); }
    .logo-text span { color: var(--primary); }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-input {
      height: 38px; padding: 0 14px 0 38px;
      border: 1.5px solid var(--border); border-radius: 100px;
      background: var(--bg); font-family: var(--font-sans); font-size: 13.5px;
      color: var(--text-1); outline: none; width: 200px; transition: all .22s;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus {
      border-color: var(--primary); background: #fff;
      box-shadow: 0 0 0 3px var(--primary-light); width: 240px;
    }
    .search-icon { position: absolute; left: 12px; color: var(--text-3); pointer-events: none; }
    .nav-pill {
      font-size: 13px; font-weight: 500; color: var(--text-2); text-decoration: none;
      padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 100px;
      transition: all .18s; white-space: nowrap;
    }
    .nav-pill:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-bg); }

    /* ── HERO ─────────────────────────────────────── */
    .hero {
      background: linear-gradient(160deg, var(--primary-bg) 0%, var(--bg) 65%);
      padding: 88px 24px 80px; position: relative; overflow: hidden;
    }
    /* dot grid pattern */
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(14,123,115,.15) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -60px; right: -60px;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner { max-width: 640px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.85); border: 1px solid var(--primary-light);
      color: var(--primary-dark); backdrop-filter: blur(8px);
      font-size: 11.5px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      padding: 6px 16px; border-radius: 100px; margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(36px, 5.5vw, 56px); font-weight: 700; line-height: 1.1;
      letter-spacing: -1.5px; color: var(--text-1); margin-bottom: 20px;
    }
    .hero h1 em { font-style: normal; color: var(--primary); }
    .hero-sub {
      font-family: var(--font-serif); font-size: 18px; color: var(--text-2);
      line-height: 1.72; max-width: 480px; margin: 0 auto 32px;
    }
    /* ── BLOG SECTION ─────────────────────────────── */
    .blog-section { max-width: 1200px; margin: 0 auto; padding: 52px 24px 96px; }

    /* category tabs */
    .cat-tabs {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 2px; margin-bottom: 40px;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 8px 20px;
      border: 1.5px solid var(--border); border-radius: 100px;
      background: var(--surface); font-family: var(--font-sans);
      font-size: 13.5px; font-weight: 500; color: var(--text-2);
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--primary); color: var(--primary); }
    .cat-tab.active {
      background: var(--primary); border-color: var(--primary);
      color: #fff; box-shadow: 0 2px 8px rgba(14,123,115,.3);
    }

    /* ── POSTS GRID ───────────────────────────────── */
    .posts-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 28px; }

    /* ── FEATURED CARD (magazine overlay style) ─── */
    .post-card-featured {
      grid-column: 1/-1;
      border-radius: var(--r-lg); overflow: hidden;
      height: 440px; position: relative;
      cursor: pointer; box-shadow: var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .post-card-featured:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .feat-bg-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform .45s ease;
    }
    .post-card-featured:hover .feat-bg-img { transform: scale(1.04); }
    .feat-bg-grad {
      position: absolute; inset: 0; width: 100%; height: 100%;
      transition: transform .45s ease;
    }
    .post-card-featured:hover .feat-bg-grad { transform: scale(1.04); }
    .feat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, rgba(8,30,25,.82) 0%, rgba(8,30,25,.55) 45%, rgba(8,30,25,.15) 100%);
    }
    .feat-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 48px 52px; max-width: 58%;
    }
    .feat-label {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      color: var(--accent); background: rgba(255,255,255,.12);
      border: 1px solid rgba(245,158,11,.35); border-radius: 100px;
      padding: 4px 12px; margin-bottom: 14px; width: fit-content;
    }
    .feat-meta { font-size: 12.5px; color: rgba(255,255,255,.6); margin-bottom: 12px; }
    .feat-title {
      font-size: clamp(22px, 2.6vw, 30px); font-weight: 700;
      line-height: 1.22; letter-spacing: -.4px;
      color: #fff; margin-bottom: 14px;
    }
    .feat-excerpt {
      font-family: var(--font-serif); font-size: 15px; color: rgba(255,255,255,.75);
      line-height: 1.65; margin-bottom: 24px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .feat-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13.5px; font-weight: 700; color: #fff;
      background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3);
      backdrop-filter: blur(8px); padding: 9px 20px; border-radius: 100px;
      transition: all .2s; width: fit-content;
    }
    .feat-cta svg { transition: transform .18s; }
    .post-card-featured:hover .feat-cta { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.5); }
    .post-card-featured:hover .feat-cta svg { transform: translateX(4px); }

    /* ── REGULAR CARDS ───────────────────────────── */
    .post-card {
      background: var(--surface); border-radius: var(--r); overflow: hidden;
      box-shadow: var(--shadow); border: 1px solid var(--border-soft);
      cursor: pointer; transition: transform .22s ease, box-shadow .22s ease;
      display: flex; flex-direction: column;
    }
    .post-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    /* category accent top border */
    .post-card::before {
      content: ''; display: block; height: 3px;
      background: var(--card-accent, var(--primary));
      flex-shrink: 0;
    }

    .card-img {
      height: 196px; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .38s ease;
    }
    .post-card:hover .card-img img { transform: scale(1.05); }
    .card-img-grad { position: absolute; inset: 0; }
    /* bottom gradient on image for chip readability */
    .card-img::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(to top, rgba(0,0,0,.35) 0%, transparent 100%);
      pointer-events: none;
    }
    .cat-chip {
      position: absolute; bottom: 12px; left: 14px; z-index: 1;
      padding: 4px 11px; border-radius: 100px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.3);
    }

    .card-body { padding: 20px 22px 22px; display: flex; flex-direction: column; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
    .card-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-3); }
    .card-title {
      font-size: 16px; font-weight: 700; line-height: 1.38; letter-spacing: -.2px;
      color: var(--text-1); margin-bottom: 10px; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      transition: color .15s;
    }
    .post-card:hover .card-title { color: var(--primary); }
    .card-excerpt {
      font-family: var(--font-serif); font-size: 13.5px; color: var(--text-2); line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft);
    }
    .read-more {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12.5px; font-weight: 700; color: var(--primary); letter-spacing: .1px;
    }
    .read-more svg { transition: transform .18s; }
    .post-card:hover .read-more svg { transform: translateX(4px); }

    /* ── IMAGE SKELETON ────────────────────────────── */
    .img-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #f0ede8 25%, #e8e4de 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    /* ── EMPTY STATE ───────────────────────────────── */
    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
    .empty-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: var(--primary-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: var(--primary);
    }
    .empty h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty p { font-family: var(--font-serif); font-size: 15px; color: var(--text-2); max-width: 340px; margin: 0 auto; line-height: 1.75; }

    /* ── POST VIEW ─────────────────────────────────── */
    #post-view { display: none; max-width: 760px; margin: 0 auto; padding: 48px 24px 96px; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-sans); font-size: 13.5px; font-weight: 600;
      color: var(--text-2); background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 100px; cursor: pointer; padding: 8px 18px; margin-bottom: 36px;
      transition: all .18s;
    }
    .back-btn:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-bg); }
    .post-cover-wrap {
      width: 100%; border-radius: var(--r-lg); overflow: hidden;
      margin-bottom: 40px; box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .post-cover-img { width: 100%; height: 420px; object-fit: cover; display: block; }
    .post-cover-grad { width: 100%; height: 300px; display: block; }
    .post-cat-pill {
      display: inline-block; padding: 5px 16px; border-radius: 100px;
      font-size: 12px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .post-view-title {
      font-size: clamp(28px,4vw,42px); font-weight: 700; line-height: 1.15;
      letter-spacing: -.7px; color: var(--text-1); margin-bottom: 16px;
    }
    .post-view-meta {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      font-size: 13px; color: var(--text-3);
      margin-bottom: 40px; padding-bottom: 32px;
      border-bottom: 2px solid var(--border);
    }
    .post-view-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); }
    .post-body { font-family: var(--font-serif); font-size: 17.5px; line-height: 1.82; color: var(--text-1); }
    .post-body p { margin-bottom: 1.4em; }
    .post-body h2 { font-family: var(--font-sans); font-size: 22px; font-weight: 700; letter-spacing: -.3px; margin: 1.8em 0 .65em; color: var(--text-1); }
    .post-body h3 { font-family: var(--font-sans); font-size: 18.5px; font-weight: 600; margin: 1.5em 0 .5em; }
    .post-body strong { font-weight: 700; }
    .post-body em { font-style: italic; }
    .post-body hr { border: none; border-top: 2px solid var(--border); margin: 2.4em 0; }
    .post-body img, .md-img { max-width: 100%; border-radius: var(--r); margin: 1.5em 0; display: block; }
    .post-body video, .md-video { max-width: 100%; border-radius: var(--r); margin: 1.5em 0; display: block; outline: none; }

    /* ── FOOTER ────────────────────────────────────── */
    footer { border-top: 1px solid var(--border); padding: 32px 24px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-copy { font-size: 13px; color: var(--text-3); }
    .footer-admin { font-size: 13px; color: var(--text-3); text-decoration: none; transition: color .15s; }
    .footer-admin:hover { color: var(--primary); }

    /* ── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 960px) {
      .posts-grid { grid-template-columns: repeat(2,1fr); }
      .feat-content { max-width: 70%; padding: 36px 36px; }
    }
    @media (max-width: 640px) {
      .posts-grid { grid-template-columns: 1fr; }
      .search-input { width: 150px; }
      .nav-pill { display: none; }
      .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
      .hero { padding: 60px 20px 56px; }
      .post-card-featured { height: 360px; }
      .feat-content { max-width: 100%; padding: 24px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="mainNav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="showBlog()">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.5 2 6 4.2 6 7.2c0 1.7.55 3.3 1.6 5l1.7 6.3c.45 1.7 1.4 2.5 2.7 2.5s2.25-.8 2.7-2.5l1.7-6.3C17.45 10.5 18 8.9 18 7.2 18 4.2 15.5 2 12 2z"/></svg>
      </div>
      <span class="logo-text">The Smile <span>Journal</span></span>
    </div>
    <div class="nav-right">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="search" class="search-input" placeholder="Search posts…" oninput="handleSearch(this.value)" />
      </div>
      <a href="admin.html" class="nav-pill">Admin →</a>
    </div>
  </div>
</nav>

<!-- BLOG VIEW -->
<div id="blog-view">
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.5 2 6 4.2 6 7.2c0 1.7.55 3.3 1.6 5l1.7 6.3c.45 1.7 1.4 2.5 2.7 2.5s2.25-.8 2.7-2.5l1.7-6.3C17.45 10.5 18 8.9 18 7.2 18 4.2 15.5 2 12 2z"/></svg>
        Pediatric Dental Insights
      </div>
      <h1>Healthy Smiles<br>Start <em>Early</em></h1>
      <p class="hero-sub">Friendly tips, honest advice, and stories from the dental chair — for parents and little ones alike.</p>
    </div>
  </section>

  <div class="blog-section">
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" onclick="filterCat('all',this)">All Posts</button>
      <button class="cat-tab" onclick="filterCat('Tips &amp; Tricks',this)">Tips &amp; Tricks</button>
      <button class="cat-tab" onclick="filterCat('Oral Health',this)">Oral Health</button>
      <button class="cat-tab" onclick="filterCat('For Parents',this)">For Parents</button>
      <button class="cat-tab" onclick="filterCat('Kids &amp; Teens',this)">Kids &amp; Teens</button>
      <button class="cat-tab" onclick="filterCat('Office News',this)">Office News</button>
    </div>
    <div class="posts-grid" id="postsGrid"></div>
  </div>
</div>

<!-- POST VIEW -->
<div id="post-view">
  <button class="back-btn" onclick="showBlog()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to all posts
  </button>
  <div id="postContent"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <span class="footer-copy">© 2024 The Smile Journal &nbsp;·&nbsp; All rights reserved</span>
    <a href="admin.html" class="footer-admin">Admin portal →</a>
  </div>
</footer>

<script>
  const KEY = 'dental_blog_posts';
  let activeCat = 'all', activeSearch = '';

  /* cover images for the 4 built-in sample posts */
  const SAMPLE_IMAGES = {
    s1: 'https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=900&h=500&fit=crop&auto=format&q=80',
    s2: 'https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=900&h=500&fit=crop&auto=format&q=80',
    s3: 'https://images.unsplash.com/photo-1582750433449-648ed127bb54?w=900&h=500&fit=crop&auto=format&q=80',
    s4: 'https://images.unsplash.com/photo-1607990281513-2c110a25bd8c?w=900&h=500&fit=crop&auto=format&q=80',
  };

  const CATS = {
    'Tips & Tricks': { bg:'#CCFBF1', fg:'#0E7B73', accent:'#0E7B73', g:'linear-gradient(135deg,#0E7B73,#059669)' },
    'Oral Health':   { bg:'#D1FAE5', fg:'#059669', accent:'#059669', g:'linear-gradient(135deg,#059669,#047857)' },
    'For Parents':   { bg:'#FEF3C7', fg:'#B45309', accent:'#D97706', g:'linear-gradient(135deg,#D97706,#B45309)' },
    'Kids & Teens':  { bg:'#EDE9FE', fg:'#7C3AED', accent:'#7C3AED', g:'linear-gradient(135deg,#7C3AED,#6D28D9)' },
    'Office News':   { bg:'#E0F2FE', fg:'#0369A1', accent:'#0284C7', g:'linear-gradient(135deg,#0284C7,#0369A1)' },
  };
  function cc(c) { return CATS[c] || { bg:'#CCFBF1', fg:'#0E7B73', accent:'#0E7B73', g:'linear-gradient(135deg,#0E7B73,#14B8A6)' }; }
  function load() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  function save(p) { localStorage.setItem(KEY, JSON.stringify(p)); }
  function readTime(t) { return Math.max(1, Math.round(t.trim().split(/\s+/).length / 200)) + ' min read'; }
  function fmtDate(s) { return new Date(s).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
  function excerpt(c, n=145) {
    const p = c.replace(/^[#]+\s+/gm,'').replace(/[*_]/g,'').replace(/\n+/g,' ').trim();
    return p.length > n ? p.slice(0,n) + '…' : p;
  }
  function renderMd(raw) {
    return raw
      .replace(/\[video\]\(([^)]+)\)/g,'<video src="$1" controls class="md-video"></video>')
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" class="md-img">')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^---$/gm,'<hr>')
      .split(/\n\n+/)
      .map(b => b.startsWith('<h') || b.startsWith('<hr') || b.includes('<img ') || b.includes('<video ') ? b : `<p>${b.replace(/\n/g,'<br>')}</p>`)
      .join('');
  }

  /* ── featured card (magazine bleed) ── */
  function featuredCardHtml(p) {
    const c = cc(p.category);
    const mediaHtml = p.coverImage
      ? `<img class="feat-bg-img" src="${p.coverImage}" alt="${p.title}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
         <div class="feat-bg-grad" style="background:${c.g};display:none"></div>`
      : `<div class="feat-bg-grad" style="background:${c.g}"></div>`;
    return `<div class="post-card-featured" onclick="openPost('${p.id}')">
      ${mediaHtml}
      <div class="feat-overlay"></div>
      <div class="feat-content">
        <div class="feat-label">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" style="opacity:.9">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/>
          </svg>
          Featured
        </div>
        <div class="feat-meta">${fmtDate(p.createdAt)} &nbsp;·&nbsp; ${readTime(p.content)}</div>
        <div class="feat-title">${p.title}</div>
        <div class="feat-excerpt">${excerpt(p.content, 200)}</div>
        <div class="feat-cta">
          Read article
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </div>`;
  }

  /* ── regular card ── */
  function cardHtml(p) {
    const c = cc(p.category);
    const media = p.coverImage
      ? `<div class="img-skeleton"></div>
         <img src="${p.coverImage}" alt="${p.title}"
              style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .3s,transform .38s ease;opacity:0"
              onload="this.previousElementSibling.style.display='none';this.style.opacity='1'"
              onerror="this.style.display='none';this.previousElementSibling.style.display='none';this.nextElementSibling.style.display='block'">`
      + `<div class="card-img-grad" style="background:${c.g};display:none"></div>`
      : `<div class="card-img-grad" style="background:${c.g}"></div>`;
    return `<div class="post-card" style="--card-accent:${c.accent}" onclick="openPost('${p.id}')">
      <div class="card-img" style="position:relative">${media}<span class="cat-chip">${p.category||'General'}</span></div>
      <div class="card-body">
        <div class="card-meta"><span>${fmtDate(p.createdAt)}</span><div class="dot"></div><span>${readTime(p.content)}</span></div>
        <div class="card-title">${p.title}</div>
        <div class="card-excerpt">${excerpt(p.content)}</div>
        <div class="card-footer">
          <span class="read-more">Read article
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </span>
        </div>
      </div>
    </div>`;
  }

  function renderGrid() {
    const grid = document.getElementById('postsGrid');
    let posts = load().filter(p => p.status === 'published');
    if (activeSearch) { const q = activeSearch.toLowerCase(); posts = posts.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)); }
    if (activeCat !== 'all') posts = posts.filter(p => p.category === activeCat);
    posts.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    if (!posts.length) {
      grid.className = 'posts-grid';
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg></div>
        <h3>${activeCat!=='all'||activeSearch?'No matching posts':'Nothing here yet'}</h3>
        <p>${activeCat!=='all'||activeSearch?'Try a different search or category.':'Check back soon — posts will appear once published.'}</p>
      </div>`;
      return;
    }

    const hasFeat = posts.length >= 2;
    grid.className = 'posts-grid';
    let html = '';
    posts.forEach((p, i) => {
      if (hasFeat && i === 0) html += featuredCardHtml(p);
      else html += cardHtml(p);
    });
    grid.innerHTML = html;
  }

  function openPost(id) {
    const p = load().find(p => p.id === id);
    if (!p) return;
    const c = cc(p.category);
    const cover = p.coverImage
      ? `<div class="post-cover-wrap"><img src="${p.coverImage}" alt="${p.title}" class="post-cover-img"></div>`
      : `<div class="post-cover-wrap"><div class="post-cover-grad" style="background:${c.g}"></div></div>`;
    document.getElementById('postContent').innerHTML = `
      ${cover}
      <span class="post-cat-pill" style="background:${c.bg};color:${c.fg}">${p.category||'General'}</span>
      <h1 class="post-view-title">${p.title}</h1>
      <div class="post-view-meta"><span>${fmtDate(p.createdAt)}</span><div class="dot"></div><span>${readTime(p.content)}</span></div>
      <div class="post-body">${renderMd(p.content)}</div>`;
    document.getElementById('blog-view').style.display = 'none';
    document.getElementById('post-view').style.display = 'block';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function showBlog() {
    document.getElementById('post-view').style.display = 'none';
    document.getElementById('blog-view').style.display = '';
    renderGrid();
  }
  function filterCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }
  function handleSearch(v) { activeSearch = v; renderGrid(); }

  /* nav scroll shadow */
  window.addEventListener('scroll', () => {
    document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  /* ── seed + image migration ── */
  (function initData() {
    const posts = load();

    /* if empty, seed from scratch with images */
    if (!posts.length) {
      const now = Date.now();
      save([
        { id:'s1', status:'published', createdAt:new Date(now-2*864e5).toISOString(),
          title:'Why Baby Teeth Matter More Than You Think', category:'Oral Health',
          coverImage: SAMPLE_IMAGES.s1,
          content:`Many parents wonder if they really need to worry about cavities in baby teeth — after all, aren't they going to fall out anyway? The short answer is: absolutely yes.\n\n## Baby Teeth Are Placeholders\n\nBaby teeth serve as natural guides for permanent teeth. When a baby tooth is lost too early due to decay, neighboring teeth can drift into that space, crowding out the permanent tooth trying to come in. This often leads to years of orthodontic treatment that might have been preventable.\n\n## Decay Can Spread\n\nCavities in baby teeth don't stay put. Untreated decay can spread to adjacent teeth — and in serious cases, reach the gums and underlying jawbone. Keeping baby teeth healthy protects the whole mouth.\n\n## It Sets the Foundation\n\nHabits formed early tend to stick. Kids who visit the dentist regularly and learn proper brushing and flossing are far more likely to carry those habits into adulthood.\n\n**The bottom line:** treat baby teeth like the important, temporary caretakers they are. They deserve every bit as much attention as permanent teeth.` },
        { id:'s2', status:'published', createdAt:new Date(now-9*864e5).toISOString(),
          title:'Making Tooth Brushing Fun for Reluctant Brushers', category:'Tips & Tricks',
          coverImage: SAMPLE_IMAGES.s2,
          content:`If you've ever had a nightly standoff with a toddler over the toothbrush, you're not alone. Getting kids to actually want to brush is one of the most common challenges parents bring up at checkups.\n\n## Let Them Pick Their Gear\n\nGive your child some ownership by letting them choose their own toothbrush — any soft-bristled brush works. Favorite characters, bright colors, and fun shapes can make a real difference in buy-in.\n\n## Use a Two-Minute Timer\n\nKids have no concept of "two full minutes." Try a sand timer, play a short song, or use a brushing app with a built-in countdown. Making the time visible and predictable reduces the dread of the unknown.\n\n## Brush Together\n\nKids learn by watching. If they see you brushing without pure dread on your face, they'll absorb that attitude. Make it a family routine, not just something that happens to them.\n\n## The Sticker Chart\n\nA simple sticker chart works surprisingly well for ages 3–7. You don't need prizes — the visual satisfaction of filling it in is often reward enough.\n\n**Remember:** help guide your child's brushing until around age 7–8, when their fine motor skills are developed enough to do it properly on their own.` },
        { id:'s3', status:'published', createdAt:new Date(now-16*864e5).toISOString(),
          title:'When Should My Child Have Their First Dental Visit?', category:'For Parents',
          coverImage: SAMPLE_IMAGES.s3,
          content:`One of the most common questions from new parents: "When do we actually need to bring our baby to the dentist?"\n\n## The One-Year Rule\n\nThe American Academy of Pediatric Dentistry recommends a first dental visit by age one, or within six months of the first tooth appearing — whichever comes first. It sounds early, but this visit is less about deep cleaning and more about connection and prevention.\n\n## What Happens at the First Visit\n\nThe first appointment is a gentle introduction. We take a look at the teeth that have come in, check for early concerns, and talk through nutrition, pacifier habits, and brushing technique. Most importantly, we want your child to leave feeling completely safe.\n\n## Why It Matters to Start Early\n\nChildren who visit the dentist young are significantly less likely to develop dental anxiety later. Familiarity builds comfort. By the time they're five and might need a real cleaning, the office feels like a known, safe place — not a scary one.\n\n## What to Expect Going Forward\n\nFrom age one on, we recommend checkups every six months. If all looks great, these are quick, positive visits. If we spot something developing, we catch it early — when it's still simple to address.\n\n*Have questions before that first visit? We're always happy to chat.*` },
        { id:'s4', status:'published', createdAt:new Date(now-24*864e5).toISOString(),
          title:'Understanding Fluoride: What Every Parent Should Know', category:'Oral Health',
          coverImage: SAMPLE_IMAGES.s4,
          content:`Fluoride has been one of the most talked-about topics in dentistry — and also one of the most thoroughly studied. Here's a clear, honest look at what it is and why we recommend it.\n\n## What Is Fluoride?\n\nFluoride is a naturally occurring mineral found in water, soil, and many foods. It works by strengthening tooth enamel, making it more resistant to the acids produced by bacteria — and it can even reverse very early-stage decay.\n\n## Is It Safe?\n\nAt recommended levels, fluoride is safe and effective. Decades of peer-reviewed research support this. The key, as with many things, is appropriate amounts for the appropriate age.\n\n## How Much Toothpaste by Age\n\nUnder 2 years: a rice-sized smear of fluoride toothpaste. Ages 2–5: a pea-sized amount. Ages 6 and up: a pea-sized amount, or as directed.\n\nTeaching kids to spit — not swallow — toothpaste is important at every age.\n\n## In-Office Fluoride Treatments\n\nWe often recommend a fluoride varnish after cleanings. It's a quick, comfortable application that provides an extra protective layer — especially helpful for children who are cavity-prone or still perfecting their brushing.\n\n**Have questions about fluoride?** Bring them up at your next visit and we'll walk through it together.` },
      ]);
      return;
    }

    /* patch existing sample posts that have no cover image */
    let changed = false;
    const patched = posts.map(p => {
      if (SAMPLE_IMAGES[p.id] && !p.coverImage) {
        changed = true;
        return { ...p, coverImage: SAMPLE_IMAGES[p.id] };
      }
      return p;
    });
    if (changed) save(patched);
  })();

  renderGrid();
</script>
</body>
</html>
